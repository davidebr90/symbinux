app-id: it.davidebr90.Symbinux
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: symbinux
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all # necessario per l'accesso a udev (USB) e BlueZ (Bluetooth)

modules:
  - name: symbinux
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
    sources:
      - type: dir
        path: ../..
