app-id: it.davidebr90.Symbinux
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
# Rust core is built with the freedesktop rust-stable SDK extension.
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: symbinux
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all # udev (USB) and BlueZ (Bluetooth) access
  - --system-talk-name=org.freedesktop.login1 # uaccess for phone devices
  - --system-talk-name=org.bluez # Bluetooth pairing/scan (app-driven)
  - --system-talk-name=org.freedesktop.NetworkManager # Wi-Fi scan (nmcli)
  - --talk-name=org.bluez.obex # PBAP contacts over the session bus
  - --talk-name=org.freedesktop.Notifications # desktop notifications (notify-rust)

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

modules:
  # 1) Rust core + CLI (`symbinux-fbus`), used by the GUI at runtime, plus shell
  #    completions generated from the built binary.
  - name: symbinux-core
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/symbinux-core/cargo
    build-commands:
      - cargo build --release --offline --bin symbinux-fbus || cargo build --release --bin symbinux-fbus
      - install -Dm755 target/release/symbinux-fbus /app/bin/symbinux-fbus
      - install -d /app/share/bash-completion/completions /app/share/zsh/site-functions /app/share/fish/vendor_completions.d /app/share/man/man1
      - target/release/symbinux-fbus completions bash > /app/share/bash-completion/completions/symbinux-fbus
      - target/release/symbinux-fbus completions zsh > /app/share/zsh/site-functions/_symbinux-fbus
      - target/release/symbinux-fbus completions fish > /app/share/fish/vendor_completions.d/symbinux-fbus.fish
      - target/release/symbinux-fbus man > /app/share/man/man1/symbinux-fbus.1
    sources:
      - type: dir
        path: ../..

  # 2) Python GTK GUI (`symbinux`), plus the desktop file, AppStream metainfo and
  #    the application icon.
  - name: symbinux-gui
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
      - install -Dm644 packaging/flatpak/it.davidebr90.Symbinux.desktop /app/share/applications/it.davidebr90.Symbinux.desktop
      - install -Dm644 packaging/flatpak/it.davidebr90.Symbinux.metainfo.xml /app/share/metainfo/it.davidebr90.Symbinux.metainfo.xml
      - install -Dm644 assets/logo/symbinux_icon.png /app/share/icons/hicolor/256x256/apps/it.davidebr90.Symbinux.png
      - install -Dm644 assets/logo/symbinux_icon_128.png /app/share/icons/hicolor/128x128/apps/it.davidebr90.Symbinux.png
    sources:
      - type: dir
        path: ../..
