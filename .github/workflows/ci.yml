name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev libgtk-4-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  macos:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK4
        run: brew install gtk4 pkgconf
      - name: Build (workspace, GUI included)
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  packaging:
    name: Packaging metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validators
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils appstream
      - name: Validate .desktop
        run: desktop-file-validate packaging/flatpak/it.davidebr90.Symbinux.desktop
      - name: Validate AppStream metainfo
        run: appstreamcli validate --no-net packaging/flatpak/it.davidebr90.Symbinux.metainfo.xml
